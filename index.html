<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sistem Informasi Akademik Santri Maskanul Huda An-Nur</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#0b3b2e;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.loading {
  position:fixed; inset:0; z-index:999;
  display:flex; align-items:center; justify-content:center;
  background:#0b3b2e;
}

.content { text-align:center; padding:2rem; }

.logo {
  width:80px; height:80px;
  border-radius:50%;
  border:1.5px solid rgba(200,169,107,0.5);
  object-fit:contain;
  margin-bottom:1.5rem;
}

.eyebrow {
  font-size:11px;
  letter-spacing:3px;
  color:rgba(200,169,107,0.7);
  text-transform:uppercase;
  margin-bottom:0.5rem;
}

.title {
  font-size:22px;
  font-weight:500;
  color:#fff;
  line-height:1.5;
  margin-bottom:0.5rem;
}

.arabic {
  font-family:'Scheherazade New', serif;
  font-size:22px;
  color:rgba(200,169,107,0.9);
  line-height:2;
  margin-bottom:1.5rem;
}

.subtitle {
  font-size:13px;
  color:rgba(255,255,255,0.45);
  line-height:1.8;
}

iframe {
  width:100%;
  height:100%;
  border:none;
  transform-origin:top left;
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="content">
    <img src="https://lh3.googleusercontent.com/d/1fn5FDmQNhpsewoQNtpUv2TmgQ9yiSN3X" class="logo" alt="Logo">
    <p class="eyebrow">Pondok Pesantren Tahfidzul Qur'an</p>
    <h1 class="title">Maskanul Huda An-Nur</h1>
    <p class="arabic">مَسْكَنُ الْهُدَى وَالنُّور</p>
    <p class="subtitle">Sistem Informasi Akademik Santri</p>
  </div>
</div>

<iframe
  id="mainFrame"
  src="https://script.google.com/macros/s/AKfycbzlgo7xcu-irUFcTKYo0PXuy4ryI1izmWLsR8p944r-9JzwtVHR8uSRA8Pd3KI9Gr5i3g/exec"
  onload="document.getElementById('loading').style.display='none'">
</iframe>

<script>
try {
  var iframe = document.getElementById('mainFrame');
  iframe.addEventListener('load', function() {
    try {
      var iframeDoc = this.contentDocument || this.contentWindow.document;
      var meta = iframeDoc.querySelector('meta[name="viewport"]');
      if (!meta) {
        meta = iframeDoc.createElement('meta');
        meta.name = 'viewport';
        iframeDoc.head.appendChild(meta);
      }
      meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
    } catch(e) {}
  });
} catch(e) {}
</script>

</body>
</html>
